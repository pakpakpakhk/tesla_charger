<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Charging Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 30px;
            width: 100%;
            max-width: 500px;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 8px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .car-info {
            background: #f8f9fa;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #555;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .time-inputs {
            display: flex;
            gap: 12px;
        }

        .time-input-wrapper {
            flex: 1;
        }

        .time-input-wrapper label {
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
        }

        input[type="time"],
        input[type="number"],
        input[type="text"] {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
            -webkit-appearance: none;
            appearance: none;
        }

        input[type="time"]:focus,
        input[type="number"]:focus,
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .battery-inputs {
            display: flex;
            gap: 12px;
        }

        .battery-input-wrapper {
            flex: 1;
        }

        .battery-input-wrapper label {
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 24px;
        }

        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-calculate {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-calculate:active {
            transform: scale(0.98);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-reset {
            background: #f0f0f0;
            color: #333;
        }

        .btn-reset:active {
            background: #e0e0e0;
            transform: scale(0.98);
        }

        .result {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
            padding: 20px;
            margin-top: 25px;
            display: none;
            animation: fadeIn 0.5s ease-out;
        }

        .result.show {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-title {
            text-align: center;
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .amperage-display {
            background: white;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            margin-bottom: 15px;
        }

        .amperage-value {
            font-size: 48px;
            font-weight: 700;
            color: #667eea;
        }

        .amperage-unit {
            font-size: 18px;
            color: #999;
            margin-left: 5px;
        }

        .amperage-label {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .result-details {
            background: white;
            border-radius: 10px;
            padding: 15px;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
        }

        .result-row:last-child {
            border-bottom: none;
        }

        .result-label {
            color: #666;
        }

        .result-value {
            font-weight: 600;
            color: #333;
        }

        .warning {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 12px 14px;
            border-radius: 6px;
            margin-top: 15px;
            font-size: 13px;
            color: #856404;
            display: none;
        }

        .warning.show {
            display: block;
        }

        .error {
            background: #f8d7da;
            border-left: 4px solid #dc3545;
            padding: 12px 14px;
            border-radius: 6px;
            margin-top: 15px;
            font-size: 13px;
            color: #721c24;
            display: none;
        }

        .error.show {
            display: block;
        }

        .info-icon {
            font-size: 11px;
            color: #999;
            margin-top: 8px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            .amperage-value {
                font-size: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚡ Tesla Charger</h1>
            <p>Charging Calculator</p>
        </div>

        <div class="car-info">
            <strong>🚗 Model Y Juniper RWD</strong><br>
            Battery: 62 kWh | Charger: 220V, 32A Max
        </div>

        <form id="calculatorForm">
            <!-- Time Inputs -->
            <div class="form-group">
                <label>⏰ Charging Time</label>
                <div class="time-inputs">
                    <div class="time-input-wrapper">
                        <label style="font-size: 11px; font-weight: 500;">Start</label>
                        <input type="time" id="startTime" required>
                    </div>
                    <div class="time-input-wrapper">
                        <label style="font-size: 11px; font-weight: 500;">End</label>
                        <input type="time" id="endTime" required>
                    </div>
                </div>
            </div>

            <!-- Battery Inputs -->
            <div class="form-group">
                <label>🔋 Battery Percentage</label>
                <div class="battery-inputs">
                    <div class="battery-input-wrapper">
                        <label style="font-size: 11px; font-weight: 500;">Current %</label>
                        <input type="number" id="currentBattery" min="0" max="100" step="1" placeholder="e.g., 20" required>
                    </div>
                    <div class="battery-input-wrapper">
                        <label style="font-size: 11px; font-weight: 500;">Target %</label>
                        <input type="number" id="targetBattery" min="0" max="100" step="1" placeholder="e.g., 80" required>
                    </div>
                </div>
            </div>

            <!-- Buttons -->
            <div class="button-group">
                <button type="button" class="btn-calculate" onclick="calculateAmperage()">Calculate</button>
                <button type="reset" class="btn-reset">Reset</button>
            </div>
        </form>

        <!-- Result -->
        <div id="resultContainer" class="result">
            <div class="result-title">Recommended Setting</div>
            
            <div class="amperage-display">
                <div>
                    <span class="amperage-value" id="amperage">0</span><span class="amperage-unit">A</span>
                </div>
                <div class="amperage-label">Amperage</div>
            </div>

            <div class="result-details">
                <div class="result-row">
                    <span class="result-label">Charging Duration</span>
                    <span class="result-value" id="duration">-</span>
                </div>
                <div class="result-row">
                    <span class="result-label">Energy Needed</span>
                    <span class="result-value" id="energy">-</span>
                </div>
                <div class="result-row">
                    <span class="result-label">Power Output</span>
                    <span class="result-value" id="power">-</span>
                </div>
                <div class="result-row">
                    <span class="result-label">Max Safe Current</span>
                    <span class="result-value">32 A</span>
                </div>
            </div>

            <div id="warningMessage" class="warning"></div>
            <div id="errorMessage" class="error"></div>
        </div>
    </div>

    <script>
        const BATTERY_CAPACITY = 62; // kWh usable
        const WALL_VOLTAGE = 220; // Volts
        const MAX_AMPERAGE = 32; // Amps
        const CHARGING_EFFICIENCY = 0.95; // 95% efficiency

        function getCurrentTime() {
            const now = new Date();
            return now.toTimeString().slice(0, 5);
        }

        function getDefaultEndTime() {
            const now = new Date();
            now.setHours(now.getHours() + 8);
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            return `${hours}:${minutes}`;
        }

        // Initialize default times on page load
        window.addEventListener('DOMContentLoaded', function() {
            document.getElementById('startTime').value = getCurrentTime();
            document.getElementById('endTime').value = getDefaultEndTime();
        });

        function calculateAmperage() {
            // Get input values
            const startTime = document.getElementById('startTime').value;
            const endTime = document.getElementById('endTime').value;
            const currentBattery = parseFloat(document.getElementById('currentBattery').value);
            const targetBattery = parseFloat(document.getElementById('targetBattery').value);

            // Validation
            if (!startTime || !endTime || isNaN(currentBattery) || isNaN(targetBattery)) {
                showError('Please fill in all fields');
                return;
            }

            if (currentBattery < 0 || currentBattery > 100 || targetBattery < 0 || targetBattery > 100) {
                showError('Battery percentage must be between 0 and 100');
                return;
            }

            if (currentBattery >= targetBattery) {
                showError('Target battery must be higher than current battery');
                return;
            }

            // Calculate charging time in hours
            const start = new Date(`2000-01-01 ${startTime}`);
            const end = new Date(`2000-01-01 ${endTime}`);
            
            // Handle case where end time is next day
            if (end <= start) {
                end.setDate(end.getDate() + 1);
            }

            const chargingTimeMs = end - start;
            const chargingHours = chargingTimeMs / (1000 * 60 * 60);

            if (chargingHours <= 0) {
                showError('End time must be after start time');
                return;
            }

            // Calculate energy needed
            const batteryPercentageToCharge = targetBattery - currentBattery;
            const energyNeeded = (BATTERY_CAPACITY * batteryPercentageToCharge) / 100;

            // Calculate required power (accounting for efficiency)
            const requiredPowerKW = (energyNeeded / chargingHours) / CHARGING_EFFICIENCY;
            const requiredPowerW = requiredPowerKW * 1000;

            // Calculate required amperage
            const requiredAmperage = requiredPowerW / WALL_VOLTAGE;

            // Round to nearest 0.5A
            const roundedAmperage = Math.round(requiredAmperage * 2) / 2;

            // Display results
            displayResults(
                roundedAmperage,
                chargingHours,
                energyNeeded,
                requiredPowerKW
            );

            // Check warnings
            checkWarnings(roundedAmperage, chargingHours, batteryPercentageToCharge);

            // Show result container
            document.getElementById('resultContainer').classList.add('show');
        }

        function displayResults(amperage, hours, energy, power) {
            // Clear previous messages
            document.getElementById('warningMessage').textContent = '';
            document.getElementById('warningMessage').classList.remove('show');
            document.getElementById('errorMessage').textContent = '';
            document.getElementById('errorMessage').classList.remove('show');

            // Format duration
            const wholeHours = Math.floor(hours);
            const minutes = Math.round((hours - wholeHours) * 60);
            const durationStr = wholeHours > 0 
                ? `${wholeHours}h ${minutes}m` 
                : `${minutes}m`;

            // Update display
            document.getElementById('amperage').textContent = amperage.toFixed(1);
            document.getElementById('duration').textContent = durationStr;
            document.getElementById('energy').textContent = energy.toFixed(2) + ' kWh';
            document.getElementById('power').textContent = power.toFixed(2) + ' kW';
        }

        function checkWarnings(amperage, hours, percentageToCharge) {
            const warningEl = document.getElementById('warningMessage');

            if (amperage > MAX_AMPERAGE) {
                warningEl.textContent = `⚠️ Required amperage (${amperage.toFixed(1)}A) exceeds max charger capacity (${MAX_AMPERAGE}A). Consider extending charging time or reducing target percentage.`;
                warningEl.classList.add('show');
            } else if (hours < 1) {
                warningEl.textContent = `⚠️ Charging time is very short (${(hours * 60).toFixed(0)} minutes). This may stress the battery.`;
                warningEl.classList.add('show');
            } else if (percentageToCharge > 80) {
                warningEl.textContent = `✓ Charging a large percentage (${percentageToCharge}%). Monitor temperature.`;
                warningEl.classList.add('show');
            }
        }

        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = `❌ ${message}`;
            errorEl.classList.add('show');
            document.getElementById('resultContainer').classList.remove('show');
        }

        // Reset form on reset button click
        document.getElementById('calculatorForm').addEventListener('reset', function() {
            document.getElementById('resultContainer').classList.remove('show');
            document.getElementById('warningMessage').classList.remove('show');
            document.getElementById('errorMessage').classList.remove('show');
        });
    </script>
</body>
</html>
